name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cv360/package-lock.json

      - name: Install dependencies
        working-directory: cv360
        run: npm ci

      - name: Lint
        working-directory: cv360
        run: npm run lint

      - name: Build
        working-directory: cv360
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: cv360/dist/
          retention-days: 1
